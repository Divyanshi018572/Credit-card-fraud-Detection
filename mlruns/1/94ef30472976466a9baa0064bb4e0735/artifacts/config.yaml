business_logic:
  risk_tiers:
    critical: 0.8
    high: 0.6
    medium: 0.35
models:
  isolation_forest:
    contamination: 0.0017
    n_estimators: 200
    n_jobs: 1
    random_state: 42
  one_class_svm:
    gamma: scale
    kernel: rbf
    nu: 0.0017
    subsample_size: 50000
  random_forest:
    class_weight: balanced
    max_depth: 14
    min_samples_leaf: 2
    n_estimators: 400
    n_jobs: 1
    random_state: 42
  tuning:
    cv: 3
    n_iter: 6
    param_distributions:
      learning_rate:
      - 0.01
      - 0.03
      - 0.05
      - 0.1
      max_depth:
      - 3
      - 4
      - 5
      - 6
      n_estimators:
      - 200
      - 300
      - 400
      scale_pos_weight:
      - 300
      - 400
      - 500
      - 578
      - 700
      subsample:
      - 0.7
      - 0.8
      - 0.9
      - 1.0
    random_state: 42
  xgboost:
    eval_metric: logloss
    n_jobs: 1
    objective: binary:logistic
    random_state: 42
    tree_method: hist
paths:
  models_dir: models
  outputs_dir: outputs
  processed_dir: data/processed
  raw_data: data/raw/creditcard.csv
preprocessing:
  random_state: 42
  smote:
    random_state: 42
    sampling_strategy: 0.1
  test_size: 0.2
